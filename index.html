function renderLanding(){var f=S.today.dayForm?formInfo(S.today.dayForm):null;return '<div class="appBg"><div class="fog"></div>'+buildStars()+'<div class="landing screen"><div><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="tiny">Ascension Arc</div><div style="font-size:13px;font-weight:900;color:var(--accent);margin-top:4px">'+esc(th().name)+'</div></div><div class="sigil">'+th().icon+'</div></div>'+card('<div class="tiny">Welcome back</div><div style="font-size:28px;font-weight:900;letter-spacing:2px;margin-top:8px">'+esc(S.profile)+'</div><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:4px">'+(S.arc.mode==='summer'?'Summer Arc':'School Arc')+' · Theme stays independent · Day '+S.arc.dayNumber+'</div><div style="display:flex;justify-content:space-between;margin-top:16px"><div><div class="tiny">Rank</div><div style="font-size:18px;font-weight:900;color:var(--accent)">'+rank(S.arc.level).name+'</div></div><div><div class="tiny">Streak</div><div style="font-size:18px;font-weight:900;color:#FBBF24;text-align:right">'+(S.arc.streak||0)+'</div></div></div><div style="margin-top:15px">'+rankPath()+'</div>')+(f?card('<div class="tiny">Today is set</div><div style="font-size:20px;font-weight:900;color:var(--accent);margin-top:6px">'+f.n+'/5 · '+esc(f.name)+'</div><div style="font-size:10px;color:var(--muted);margin-top:5px">Continue straight to dashboard or change today’s Day Form.</div>'):'')+'</div><div style="display:grid;gap:10px;margin-top:18px"><button class="btn btnPrimary" data-a="continueArc">Continue Arc</button><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><button class="btn" data-a="select">Switch Profile</button><button class="btn" data-a="entry">'+(f?'Change Day':'Set Day')+'</button></div></div></div></div>'}
function renderSelect(){var cards=S.profiles.map(function(n){var a=loadArc(n),r=rank(a.level),t=THEMES[a.theme]||THEMES.nightmare;return '<div class="profileCard" data-a="pick" data-name="'+esc(n)+'"><div class="sigil" style="animation:none;color:'+t.accent+'">'+t.icon+'</div><div style="flex:1"><div style="font-size:14px;font-weight:900;letter-spacing:2px">'+esc(n)+'</div><div style="font-size:9px;color:var(--muted);margin-top:3px">'+t.name+' · '+(a.mode==='summer'?'Summer':'School')+' · '+r.name+'</div></div><div style="font-size:22px;color:var(--dim)">›</div></div>'}).join('')||'<div style="text-align:center;color:var(--dim);font-size:11px;padding:40px 0">No profiles yet.</div>';return '<div class="appBg"><div class="fog"></div>'+buildStars()+'<div class="content" style="padding:30px 20px"><div style="text-align:center;margin-bottom:28px"><div style="font-family:\'Cinzel Decorative\',serif;font-size:23px;letter-spacing:4px">ASCENSION ARC</div><div class="tiny" style="margin-top:8px">Choose profile</div></div>'+cards+'<button class="btn btnPrimary" data-a="create" style="width:100%;margin-top:10px">New Profile</button></div></div>'}

acro Setup.</div></div><button class="btn btnPrimary" data-a="finishCreate" style="width:100%;margin-top:16px">Create Profile</button><button class="btn" data-a="select" style="width:100%;margin-top:8px">Back</button>')+'</div></div>'}
function renderEntry(){var labels=dayLabels();var cards=labels.map(function(x,i){var n=i+1,act=(S.entryForm||3)===n;return '<button class="energyCard '+(act?'active':'')+'" data-a="energy" data-n="'+n+'"><div style="font-size:clamp(13px,3.6vw,17px);font-weight:900;color:'+(act?'var(--accent)':'#E2E8F0')+';line-height:1.25;overflow-wrap:anywhere">'+n+'/5 · '+x[0]+'</div><div style="font-size:9px;color:var(--muted);line-height:1.45;margin-top:6px;overflow-wrap:break-word">'+x[1]+'</div></button>'}).join('');var f=S.today.focus||['','',''];return '<div class="appBg"><div class="fog"></div>'+buildStars()+'<div class="content" style="padding:26px 18px;overflow:hidden"><div style="text-align:center;margin-bottom:22px"><div class="tiny">Daily Capacity</div><div style="font-size:24px;font-weight:900;margin-top:8px">Choose Today’s Form</div><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:7px">The same categories stay visible. The goals scale to fit the day.</div></div>'+card('<div class="energyGrid">'+cards+'</div>')+card('<div class="sectionTitle">Today’s Focus</div>'+[0,1,2].map(function(i){return '<input id="focus'+i+'" class="input" style="margin-bottom:8px" placeholder="Focus '+(i+1)+'" value="'+esc(f[i]||'')+'">'}).join('')+'<button class="btn btnPrimary" data-a="saveEntry" style="width:100%;margin-top:8px">Enter Dashboard</button>')+'</div></div>'}
function renderHome(){var f=S.today.dayForm?formInfo(S.today.dayForm):null;if(!f)return '<div>'+card('<div class="sectionTitle">DAY FORM NEEDED</div><div style="font-size:11px;color:var(--muted);line-height:1.7">Set today’s Day Form so goals can scale properly.</div><button class="btn btnPrimary" data-a="entry" style="width:100%;margin-top:12px">Set Day Form</button>')+'</div>';var top=trackerDefs().slice(0,3).map(function(tr){return trackerCard(tr,true)}).join('');var dom=dominantStat();var focus=(S.today.focus||[]).filter(Boolean);return '<div>'+themeCard()+card('<div class="sectionTitle">DAY FORM</div><div style="display:flex;justify-content:space-between;gap:12px"><div><div style="font-size:24px;font-weight:900;color:var(--accent)">'+f.n+'/5 · '+esc(f.name)+'</div><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:5px">'+esc(f.desc)+' · All categories remain available, but goals are scaled.</div></div><button class="btn" data-a="entry" style="align-self:flex-start;padding:9px 11px">Change</button></div>')+card('<div class="sectionTitle">ASCENSION PATH</div>'+rankPath())+card('<div class="sectionTitle">STAT CHART</div>'+radar())+(focus.length?card('<div class="sectionTitle">TODAY’S FOCUS</div>'+focus.map(function(x,i){return '<div style="border:1px solid var(--edge);background:rgba(255,255,255,.04);border-radius:12px;padding:10px;margin-bottom:7px;font-size:10px;color:var(--muted)"><b style="color:var(--accent)">'+(i+1)+'.</b> '+esc(x)+'</div>'}).join('')):'')+card('<div class="sectionTitle">TOP TRACKERS</div>'+top)+card('<div class="sectionTitle">GROWTH REFLECTION</div><div style="font-size:12px;color:var(--muted);line-height:1.6">'+(dom?'Today is currently most reflective of <b style="color:'+STAT_META[dom.stat].color+'">'+label(dom.stat)+'</b> growth · '+dom.xp+' XP.':'Complete quests or trackers to reveal today’s dominant growth aspect.')+'</div>')+recentTimeline()+'</div>'}
function themeCard(){return '<div class="card" style="background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 12%,transparent),color-mix(in srgb,var(--accent2) 7%,transparent));border-color:color-mix(in srgb,var(--accent) 28%,transparent)"><div style="display:flex;align-items:center;gap:12px"><div class="sigil" style="width:42px;height:42px">'+th().icon+'</div><div style="flex:1"><div style="font-size:10px;font-weight:900;letter-spacing:2px;color:var(--accent)">'+th().name.toUpperCase()+'</div><div style="font-size:9px;color:var(--muted);line-height:1.5;margin-top:3px">Theme is independent · Current Arc: '+(S.arc.mode==='summer'?'Summer':'School')+'</div></div></div></div>'}
function trackerCard(tr,compact){var val=S.today.trackerValues[tr.id]||0,target=trackerTarget(tr),pct=Math.min(100,Math.round(val/target*100)),m=STAT_META[tr.stat]||STAT_META.Body;var step=tr.small||1;return '<div class="tracker"><div style="display:flex;justify-content:space-between;gap:10px"><div><div style="font-size:11px;font-weight:900;color:'+m.color+'">'+m.icon+' '+esc(tr.name)+'</div><div style="font-size:9px;color:var(--muted);margin-top:3px">Target: '+target+' '+tr.unit+' · Step: '+step+' '+tr.unit+' · '+label(tr.stat)+'</div></div><div style="text-align:right;font-size:12px;font-weight:900">'+val+'/'+target+'</div></div><div style="margin-top:9px">'+prog(val,target)+'</div>'+(compact?'':'<div class="trackerBtns"><button class="btn" data-a="addTrack" data-id="'+tr.id+'" data-val="-'+step+'">−'+step+'</button><button class="btn" data-a="addTrack" data-id="'+tr.id+'" data-val="'+step+'">+'+step+'</button><button class="btn" data-a="customTrack" data-id="'+tr.id+'">Set</button></div>')+'</div>'}
function renderQuests(){var by={};STAT_KEYS.forEach(function(k){by[k]=[]});var df=S.today.dayForm||3,forms=dayLabels();questDefs().forEach(function(q){by[q.stat].push(q)});function stageBtn(q,n,sel){var task=esc(q.stages[n-1]||''),xp=q.xps[n-1]||0,rec=n===(q.recStage||df);return '<button class="btn '+(sel===n?'btnPrimary':'')+'" data-a="questStage" data-id="'+q.id+'" data-stage="'+n+'" title="'+task+'" style="padding:8px 4px;font-size:9px;letter-spacing:1px;'+(rec&&!sel?'border-color:color-mix(in srgb,var(--accent) 48%,transparent)':'')+'">'+n+'<div style="font-size:7px;color:'+(sel===n?'#fff':'var(--dim)')+';letter-spacing:0;margin-top:2px">+'+xp+'</div></button>'}
function ladder(q,sel){return '<details style="margin-top:8px"><summary style="cursor:pointer;font-size:8px;color:var(--dim);letter-spacing:1.6px;text-transform:uppercase">View direct stage tasks</summary><div style="margin-top:8px;display:grid;gap:6px">'+q.stages.map(function(task,i){var n=i+1,rec=n===(q.recStage||df);return '<div data-a="questStage" data-id="'+q.id+'" data-stage="'+n+'" style="cursor:pointer;border:1px solid '+(sel===n?'var(--accent)':'var(--edge)')+';background:'+(sel===n?'color-mix(in srgb,var(--accent) 12%,transparent)':'rgba(255,255,255,.035)')+';border-radius:10px;padding:8px;display:flex;gap:8px;align-items:flex-start"><div style="width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:'+(rec?'color-mix(in srgb,var(--accent) 16%,transparent)':'rgba(255,255,255,.05)')+';color:'+(rec?'var(--accent)':'var(--muted)')+';font-size:10px;font-weight:900">'+n+'</div><div style="flex:1"><div style="font-size:10px;color:#E2E8F0;line-height:1.45">'+esc(task)+'</div><div style="font-size:8px;color:var(--dim);margin-top:3px">'+(forms[i]?esc(forms[i][0]):'Stage '+n)+(rec?' · Day Form target':'')+' · +'+(q.xps[i]||0)+' XP</div></div></div>'}).join('')+'</div></details>'}
var out='';STAT_KEYS.forEach(function(k){if(!by[k].length)return;var m=STAT_META[k];out+='<div class="card"><div class="sectionTitle" style="color:'+m.color+'">'+m.icon+' '+esc(label(k))+'</div>'+by[k].map(function(q){var prev=S.today.quests&&S.today.quests[q.id],sel=(typeof prev==='object')?(prev.stage||0):(prev?df:0),rec=q.recStage||df,task=q.stages[(sel||rec)-1]||q.goal,xp=sel?(q.xps[sel-1]||0):(q.xps[rec-1]||0);return '<div style="border:1px solid '+(sel?'color-mix(in srgb,var(--accent) 38%,transparent)':'var(--edge)')+';background:'+(sel?'color-mix(in srgb,var(--accent) 8%,transparent)':'rgba(255,255,255,.025)')+';border-radius:14px;padding:12px;margin-bottom:10px"><div style="display:flex;gap:10px;align-items:flex-start"><div class="check '+(sel?'on':'')+'">'+(sel?'✓':'')+'</div><div style="flex:1"><div style="display:flex;justify-content:space-between;gap:8px"><div style="font-size:11px;font-weight:900;color:#E2E8F0">'+esc(q.label)+'</div><div style="font-size:10px;color:'+(sel?'var(--good)':'var(--accent)')+';font-weight:900;white-space:nowrap">'+(sel?'Stage '+sel:'Target '+rec)+' · +'+xp+'</div></div><div style="font-size:10px;color:var(--muted);line-height:1.55;margin-top:4px"><b style="color:var(--accent)">'+(sel?'Completed task':'Target task')+':</b> '+esc(task)+'</div></div></div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px">'+[1,2,3,4,5].map(function(n){return stageBtn(q,n,sel)}).join('')+'</div>'+ladder(q,sel)+'</div>'}).join('')+'</div>'});return '<div>'+card('<div class="sectionTitle">INCREMENTAL QUEST BOARD</div><div style="font-size:10px;color:var(--muted);line-height:1.6">Each quest now has Stage 1–5. Stage 1 is the minimum attainable win; Stage 5 is the full ascension version. Your Day Form marks the target, but you can complete any stage you actually did.</div>')+out+'</div>'}

function renderHealthModal(){return healthForm(S.healthDraft||S.arc.health||DEFAULT_HEALTH)}
function renderCodex(){var themes=Object.keys(THEMES).map(function(k){return '<option value="'+k+'" '+(S.arc.theme===k?'selected':'')+'>'+THEMES[k].name+'</option>'}).join('');var settings='<label class="tiny">Theme</label><select class="input" id="themeSel" data-a="themeChange" style="margin-top:8px">'+themes+'</select><label class="tiny" style="display:block;margin-top:14px">Arc</label><select class="input" id="modeSel" data-a="modeChange" style="margin-top:8px"><option value="school" '+(S.arc.mode==='school'?'selected':'')+'>School Arc</option><option value="summer" '+(S.arc.mode==='summer'?'selected':'')+'>Summer Arc</option></select><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:12px">Changing School/Summer does not change theme. It only adjusts seasonal wording and whether work/school goals are emphasized.</div>';var tailor='<button class="btn btnPrimary" data-a="openTailor" style="width:100%">Retake Tailor Questionnaire</button><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:12px">Current: '+Object.keys(S.arc.tailor).filter(function(k){return S.arc.tailor[k]}).map(function(k){return k}).join(', ')+'</div>';var health='<button class="btn btnPrimary" data-a="openHealth" style="width:100%">Open Health & Macro Setup</button><div style="margin-top:12px">'+macroSummary()+'</div>';var share='<button class="btn" data-a="copyShare" style="width:100%">Copy Full Snapshot Link</button><button class="btn" data-a="copyStarter" style="width:100%;margin-top:8px">Copy Starter Link</button><button class="btn" data-a="export" style="width:100%;margin-top:8px">Download Backup</button><button class="btn" data-a="import" style="width:100%;margin-top:8px">Import Backup / Link</button>';var danger='<button class="btn" data-a="resetToday" style="width:100%">Reset Today + Roll Back Today XP</button><button class="btn" data-a="closeDay" style="width:100%;margin-top:8px">Close Day</button>';return '<div>'+codexSection('PROFILE SETTINGS','Theme and School/Summer Arc.',settings,true)+codexSection('TAILOR QUESTIONNAIRE','Redo this to personalize quests and trackers.',tailor,true)+codexSection('HEALTH & MACRO SETUP','Age, height, weight, activity, and macro targets.',health,true)+codexSection('SHARE / BACKUP','Links, starter templates, and backups.',share,false)+codexSection('DAY DATA','Close or reset the current day.',danger,false)+codexSection('VERSION',VERSION,'<div style="font-size:10px;color:var(--muted);line-height:1.6">Fixed Day Form card layout. Added per-profile Health & Macro Setup with calculated macro tracker targets. Theme remains independent from School/Summer arc.</div>',false)+'</div>'}
function recentTimeline(){var rows=(S.today.timeline||[]).slice(0,6).map(function(e){var color=e.stat&&STAT_META[e.stat]?STAT_META[e.stat].color:'var(--accent)';return '<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:9px;color:var(--muted)"><span class="pill" style="font-size:8px;padding:4px 7px">'+esc(e.time)+'</span><span style="flex:1">'+(e.stat?'<b style="color:'+color+'">'+label(e.stat)+'</b> · ':'')+esc(e.label)+'</span>'+(e.xp?'<span style="color:var(--accent);font-weight:900">+'+e.xp+'</span>':'')+'</div>'}).join('')||'<div style="font-size:10px;color:var(--dim)">No actions logged yet.</div>';return card('<div class="sectionTitle">TODAY’S TIMELINE</div>'+rows)}
function renderApp(){applyTheme();var tab=S.tab==='home'?renderHome():S.tab==='quests'?renderQuests():S.tab==='track'?renderTrack():S.tab==='boss'?renderBoss():renderCodex();var cls=S.animateTab?'tabAnim':'';return '<div class="appBg"><div class="fog"></div>'+buildStars()+'<div class="content">'+header()+'<div class="'+cls+'">'+tab+'</div></div>'+nav()+'</div>'}
function render(){applyTheme();var html='';if(S.toast)html+='<div style="position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:80;background:rgba(0,0,0,.78);border:1px solid var(--edge);border-radius:999px;padding:9px 16px;font-size:10px;color:var(--accent)">'+esc(S.toast)+'</div>';if(S.xpFloat)html+='<div class="xpFloat">'+esc(S.xpFloat)+'</div>';if(S.levelUp)html+='<div class="modalBack" data-a="closeLevel"><div class="modal" style="text-align:center"><div style="font-size:56px;color:var(--accent)">✦</div><div class="tiny">LEVEL UP</div><div style="font-size:36px;font-weight:900;margin-top:8px">LVL '+S.levelUp.level+'</div><div style="color:var(--accent);font-size:13px;font-weight:900;margin-top:6px">'+S.levelUp.rank.name+'</div><div style="font-size:10px;color:var(--dim);margin-top:14px">tap to continue</div></div></div>';if(S.phase==='splash')html+=renderSplash();else if(S.phase==='landing')html+=renderLanding();else if(S.phase==='select')html+=renderSelect();else if(S.phase==='create')html+=renderCreate();else if(S.phase==='entry')html+=renderEntry();else if(S.phase==='tailor')html+=renderApp()+renderTailorModal();else if(S.phase==='health')html+=renderApp()+renderHealthModal();else html+=renderApp();document.getElementById('root').innerHTML=html;if(S.keepScroll!=null){var y=S.keepScroll;S.keepScroll=null;requestAnimationFrame(function(){window.scrollTo(0,y)})}S.animateTab=false}
function stableRender(){S.keepScroll=window.scrollY||document.documentElement.scrollTop||0;S.animateTab=false;render()}
function createProfile(){var name=(document.getElementById('newName')||{}).value||'';name=name.trim().toUpperCase().slice(0,20);if(!name){toast('Enter a profile name.');return}var theme=(document.getElementById('newTheme')||{}).value||defaultThemeForName(name);var mode=(document.getElementById('newMode')||{}).value||'school';var p=getProfiles();if(p.indexOf(name)<0)p.push(name);saveProfiles(p);var health=Object.assign(cp(DEFAULT_HEALTH),{age:(document.getElementById('newAge')||{}).value||'',weightLb:(document.getElementById('newWeight')||{}).value||'',heightFt:(document.getElementById('newFt')||{}).value||'',heightIn:(document.getElementById('newIn')||{}).value||'',sex:(document.getElementById('newSex')||{}).value||'neutral'});var arc=ensureArc({theme:theme,mode:mode,tailor:defaultTailorForName(name),stats:defaultStatsForName(name),health:health},name);saveArc(name,arc);saveToday(name,blankToday());S.profiles=p;setProfile(name)}
function exportBackup(){var data=JSON.stringify({profile:S.profile,arc:S.arc,today:S.today},null,2);var blob=new Blob([data],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ascension-arc-'+S.profile+'.json';a.click();URL.revokeObjectURL(a.href)}function importBackup(){var txt=prompt('Paste backup JSON or shared link:');if(!txt)return;try{var p=txt.trim()[0]==='{'?JSON.parse(txt):dec(txt);if(p.arc){var name=(p.profile||'IMPORTED').toUpperCase().slice(0,20);var arr=getProfiles();if(arr.indexOf(name)<0)arr.push(name);saveProfiles(arr);saveArc(name,p.arc);saveToday(name,p.today||blankToday());S.profiles=arr;setProfile(name);toast('Imported '+name)}}catch(e){toast('Import failed.')}}function handleHash(){var h=location.hash||'';if(h.indexOf('arc=')>=0){try{var p=dec(h);if(p.arc){var name=(p.profile||'SHARED').toUpperCase().slice(0,20);var arr=getProfiles();if(arr.indexOf(name)<0)arr.push(name);saveProfiles(arr);saveArc(name,p.arc);saveToday(name,p.today||blankToday());history.replaceState(null,'',location.href.split('#')[0]);S.profiles=arr;setProfile(name);return true}}catch(e){}}if(h.indexOf('starter=')>=0){try{var p=dec(h);history.replaceState(null,'',location.href.split('#')[0]);S.pendingTemplate=p.template||{};S.phase='create';return true}catch(e){}}return false}
function bind(){document.addEventListener('click',function(e){var el=e.target.closest('[data-a]');if(!el)return;var a=el.getAttribute('data-a');if(a==='afterSplash'){S.phase=(S.today&&S.today.dayForm)?'app':'landing';S.tab='home';render()}else if(a==='landing'){S.phase='landing';render()}else if(a==='continueArc'){S.phase=(S.today.dayForm?'app':'entry');S.tab='home';S.entryForm=S.today.dayForm||3;render()}else if(a==='select'){S.phase='select';render()}else if(a==='create'){S.phase='create';render()}else if(a==='pick'){setProfile(el.getAttribute('data-name'))}else if(a==='finishCreate'){createProfile()}else if(a==='entry'){S.phase='entry';S.entryForm=S.today.dayForm||3;render()}else if(a==='energy'){S.entryForm=parseInt(el.getAttribute('data-n'))||3;render()}else if(a==='saveEntry'){S.today.dayForm=S.entryForm||3;S.today.date=todayStr();S.today.focus=[0,1,2].map(function(i){return (document.getElementById('focus'+i)||{}).value||''});timeline('Day Form set: '+formInfo(S.today.dayForm).name,0,'','entry');saveAll();S.phase='app';S.tab='home';render()}else if(a==='tab'){S.tab=el.getAttribute('data-tab');S.animateTab=true;render()}else if(a==='toggleQuest'){toggleQuest(el.getAttribute('data-id'))}else if(a==='questStage'){setQuestStage(el.getAttribute('data-id'),el.getAttribute('data-stage'))}else if(a==='addTrack'){addTracker(el.getAttribute('data-id'),parseFloat(el.getAttribute('data-val')))}else if(a==='customTrack'){customTrack(el.getAttribute('data-id'))}else if(a==='openTailor'){S.tailorDraft=cp(S.arc.tailor);S.phase='tailor';render()}else if(a==='openHealth'){S.healthDraft=cp(S.arc.health||DEFAULT_HEALTH);S.phase='health';render()}else if(a==='tailorToggle'){var k=el.getAttribute('data-key');S.tailorDraft[k]=!S.tailorDraft[k];render()}else if(a==='closeTailor'){S.tailorDraft=null;S.phase='app';render()}else if(a==='saveTailor'){S.arc.tailor=Object.assign(cp(DEFAULT_TAILOR),S.tailorDraft||{});S.tailorDraft=null;saveAll();S.phase='app';toast('Tailor saved.');render()}else if(a==='closeHealth'){S.healthDraft=null;S.phase='app';render()}else if(a==='saveHealth'){S.arc.health=Object.assign(cp(DEFAULT_HEALTH),{age:(document.getElementById('hAge')||{}).value||'',weightLb:(document.getElementById('hWeight')||{}).value||'',heightFt:(document.getElementById('hFt')||{}).value||'',heightIn:(document.getElementById('hIn')||{}).value||'',sex:(document.getElementById('hSex')||{}).value||'neutral',activity:(document.getElementById('hActivity')||{}).value||'moderate',goal:(document.getElementById('hGoal')||{}).value||'recomp'});S.healthDraft=null;saveAll();S.phase='app';toast('Health setup saved.');render()}else if(a==='copyShare'){copyText(shareLink())}else if(a==='copyStarter'){copyText(starterLink())}else if(a==='export'){exportBackup()}else if(a==='import'){importBackup()}else if(a==='resetToday'){if(confirm('Reset today and roll back today XP?')){if(S.today.appliedXp){S.arc.totalXp=Math.max(0,S.arc.totalXp-S.today.appliedXp);var st=stateFromTotal(S.arc.totalXp);S.arc.level=st.level;S.arc.xp=st.xp}S.today=blankToday();saveAll();S.phase='entry';render()}}else if(a==='closeDay'){if(confirm('Close today and move to next day?'))closeDay()}else if(a==='closeLevel'){S.levelUp=null;render()}});document.addEventListener('change',function(e){var el=e.target;if(el&&el.getAttribute('data-a')==='themeChange'){S.arc.theme=el.value;saveAll();render()}if(el&&el.getAttribute('data-a')==='modeChange'){S.arc.mode=el.value;saveAll();render()}})}
function init(){bind();S.profiles=getProfiles();if(handleHash())return;var a=active();if(a&&S.profiles.indexOf(a)>=0){S.profile=a;S.arc=loadArc(a);S.today=loadToday(a);resetDayIfNew();applyTheme();S.phase='splash';render();setTimeout(function(){if(S.phase==='splash'){S.phase=(S.today.dayForm?'app':'landing');S.tab='home';render()}},3200)}else{S.phase=S.profiles.length?'select':'create';render()}}init();
</script>
