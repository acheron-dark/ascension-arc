*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg,#080810);min-height:100vh}
body{font-family:'IBM Plex Mono',monospace,monospace;color:#E2E8F0}
#root{min-height:100vh}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(139,92,246,.4);border-radius:2px}
@keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes tabInRight{from{transform:translateX(22px);opacity:.15;filter:blur(2px)}to{transform:translateX(0);opacity:1;filter:blur(0)}}
@keyframes tabInLeft{from{transform:translateX(-22px);opacity:.15;filter:blur(2px)}to{transform:translateX(0);opacity:1;filter:blur(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 0 rgba(167,139,250,0)}50%{box-shadow:0 0 18px rgba(167,139,250,.16)}}
@keyframes floatXp{0%{transform:translateY(4px);opacity:0}35%{opacity:1}100%{transform:translateY(-22px);opacity:0}}
@keyframes checkPop{0%{transform:scale(.85)}60%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes modalRise{from{transform:translateY(16px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.su{animation:slideUp .28s ease}
.fade{animation:slideUp .35s ease}
.tabInRight{animation:tabInRight .26s cubic-bezier(.22,.61,.36,1)}
.tabInLeft{animation:tabInLeft .26s cubic-bezier(.22,.61,.36,1)}
details.codexBox{background:var(--panel,rgba(255,255,255,0.028));border:1px solid var(--edge,rgba(255,255,255,0.07));border-radius:10px;margin:10px 14px 0;overflow:hidden}
details.codexBox>summary{list-style:none;padding:15px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px}
details.codexBox>summary::-webkit-details-marker{display:none}
.codexBody{padding:0 16px 16px;border-top:1px solid rgba(255,255,255,.055)}
.chev{transition:transform .18s ease;color:var(--accent,#A78BFA)}
details[open] .chev{transform:rotate(90deg)}
.themeGlow{animation:pulseGlow 3.8s ease-in-out infinite}
.questDone{animation:checkPop .22s ease}
.modalPanel{animation:modalRise .2s ease}
input:focus,textarea:focus{outline:none}
textarea{resize:vertical}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,.1);cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#A78BFA;cursor:pointer;border:2px solid #080810}
input[type=text],input[type=number],select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:#E2E8F0;font-family:'IBM Plex Mono',monospace;padding:7px 10px}
select option{background:#111118;color:#E2E8F0}
.sharebox{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#E2E8F0;font-size:9px;font-family:'IBM Plex Mono',monospace;padding:9px;min-height:52px;line-height:1.45}
.qrow{cursor:pointer;border-radius:3px;transition:background .12s}
.qrow:hover{background:rgba(139,92,246,.07)}
.crd{cursor:pointer;transition:filter .12s}
.crd:hover{filter:brightness(1.15)}
button{cursor:pointer;font-family:'IBM Plex Mono',monospace,monospace}
button:active{opacity:.7}
</style>

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function lsG(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function getProfiles(){return lsG('arc_profiles')||[];}
function saveProfiles(p){lsS('arc_profiles',p);}
function loadArc(n){return lsG('arc_'+n+'_state');}
function saveArc(n,a){lsS('arc_'+n+'_state',a);}
function blankToday(){return {quests:{},boss:{},notes:"",focus:["","",""],timeline:[],trackers:{},appliedQuests:{},appliedBoss:{},appliedTrackers:{}};}
function ensureToday(t){
  t=t||blankToday();
  if(!t.quests)t.quests={}; if(!t.boss)t.boss={}; if(typeof t.notes!=='string')t.notes=t.notes||"";
  if(!Array.isArray(t.focus))t.focus=["","",""]; if(!Array.isArray(t.timeline))t.timeline=[];
  if(!t.trackers)t.trackers={};
  if(!t.appliedQuests)t.appliedQuests={}; if(!t.appliedBoss)t.appliedBoss={}; if(!t.appliedTrackers)t.appliedTrackers={};
  return t;
}
function loadToday(n){return ensureToday(lsG('arc_'+n+'_today')||blankToday());}
function saveToday(n,t){lsS('arc_'+n+'_today',ensureToday(t));}
function getActive(){return lsG('arc_active');}
function setActive(n){lsS('arc_active',n);}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getTier(lvl){return TIERS.filter(function(t){return lvl>=t.min&&lvl<=t.max;})[0]||TIERS[0];}
function getPhase(day){return PHASES.filter(function(p){return day>=p.range[0]&&day<=p.range[1];})[0]||PHASES[3];}
function xpNeeded(lvl){if(lvl<15)return 100;if(lvl<30)return 175;if(lvl<45)return 275;if(lvl<60)return 425;if(lvl<75)return 650;if(lvl<90)return 950;return 1400;}
function dayRating(xp){
  if(xp<30) return{label:"Lost Day",        color:"#6B7280",short:"LOST"};
  if(xp<60) return{label:"Maintenance Day", color:"#38BDF8",short:"MAIN"};
  if(xp<90) return{label:"Solid Day",       color:"#4ADE80",short:"SOLID"};
  if(xp<120)return{label:"Strong Day",      color:"#FBBF24",short:"STR"};
  return         {label:"Ascension Day",    color:"#FB923C",short:"ASC"};
}
function calcGain(score,val){
  if(score<=2)return 0;
  var raw=score===3?1:score===4?2:3;
  if(val>=91)return Math.max(0,raw-2);
  if(val>=76)return Math.max(0,raw-1);
  return raw;
}

function makeId(prefix){return prefix+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function statOptions(sel){

function encData(obj){return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function decData(str){
  str=(str||'').trim();
  if(str.indexOf('#arc=')>=0)str=str.split('#arc=')[1];
  if(str.indexOf('arc=')>=0)str=str.split('arc=')[1];
  str=str.split('&')[0].replace(/-/g,'+').replace(/_/g,'/');
  while(str.length%4)str+='=';
  return JSON.parse(decodeURIComponent(escape(atob(str))));
}
function buildShareLink(){

function buildQuestionnaireLink(){

function applyCreateTemplate(arc){

function importStarterFromHash(){
  try{
    var h=String(location.hash||'');
    if(h.indexOf('starter=')<0)return false;
    var payload=decData(h.replace('#starter=','arc='));
    S.profile=null;S.arc=null;S.today=blankToday();
    S.creating=true;S.createErr="";S.createAnswers=makeDefaultAnswers();S.createStats=cp(NEUTRAL_STATS);
    S.createTemplate=payload.template||null;
    var nm=uniqueProfileName(payload.profile||'');
    S.createName=nm==='SHARED'?"":nm;
    S.createStep=S.createName?2:1;
    S.importMsg="Questionnaire loaded. Answer honestly, then begin your arc.";
    if(history&&history.replaceState)history.replaceState(null,'',String(location.href).split('#')[0]);
    return true;
  }catch(e){S.importMsg="Could not open questionnaire link.";return false;}
}
function uniqueProfileName(name){
  name=(name||'SHARED').trim().toUpperCase().slice(0,20)||'SHARED';
  return name;
}
function importPayload(payload){
  if(!payload||!payload.arc)return false;
  var name=uniqueProfileName(payload.profile||'SHARED');
  var profiles=getProfiles();
  if(profiles.indexOf(name)<0){profiles.push(name);saveProfiles(profiles);} 
  var arc=ensureArc(payload.arc); saveArc(name,arc);
  saveToday(name,payload.today||{quests:{},boss:{},notes:""});
  S.profiles=profiles;S.profile=name;setActive(name);S.arc=arc;S.today=loadToday(name);syncTodayXp();S.tab="profile";
  S.importMsg="Imported shared profile: "+name;
  return true;
}
function importFromHash(){
  try{
    var h=String(location.hash||'');
    if(h.indexOf('arc=')<0)return false;
    var ok=importPayload(decData(h));
    if(ok&&history&&history.replaceState)history.replaceState(null,'',String(location.href).split('#')[0]);
    return ok;
  }catch(e){S.importMsg="Could not import shared profile link.";return false;}
}
function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){showToast("Share link copied.","#4ADE80");}).catch(function(){fallbackCopy(txt);});}
  else fallbackCopy(txt);
}
function fallbackCopy(txt){var t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();try{document.execCommand('copy');showToast("Share link copied.","#4ADE80");}catch(e){showToast("Copy failed. Select the link manually.","#FBBF24");}document.body.removeChild(t);}

// ─── RADAR ────────────────────────────────────────────────────────────────────
function buildRadar(stats){
  var cx=130,cy=130,r=95,n=STAT_KEYS.length;
  function pt(i,val){var a=(Math.PI*2*i)/n-Math.PI/2;return[cx+(val/100)*r*Math.cos(a),cy+(val/100)*r*Math.sin(a)];}
  function mkp(pts){return pts.map(function(p,i){return(i===0?'M':'L')+p[0]+','+p[1];}).join('')+'Z';}
  var rings=[20,40,60,80,100].map(function(v){return mkp(STAT_KEYS.map(function(_,i){return pt(i,v);}));});
  var area=mkp(STAT_KEYS.map(function(k,i){return pt(i,stats[k]);}));
  var tgt=mkp(STAT_KEYS.map(function(k,i){return pt(i,STAT_META[k].target);}));
  var svg='<svg viewBox="0 0 260 260" style="width:100%;max-width:260px;">';
  rings.forEach(function(d){svg+='<path d="'+d+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';});
  STAT_KEYS.forEach(function(_,i){var e=pt(i,100);svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+e[0]+'" y2="'+e[1]+'" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>';});
  svg+='<path d="'+tgt+'" fill="rgba(251,191,36,0.06)" stroke="rgba(251,191,36,0.35)" stroke-width="1.5" stroke-dasharray="5,3"/>';
  svg+='<path d="'+area+'" fill="rgba(139,92,246,0.18)" stroke="rgba(139,92,246,0.75)" stroke-width="2"/>';
  STAT_KEYS.forEach(function(k,i){var p=pt(i,stats[k]);svg+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="4.5" fill="'+STAT_META[k].color+'" stroke="#0a0a0f" stroke-width="1.5"/>';});
  STAT_KEYS.forEach(function(k,i){
    var p=pt(i,115);
    // use up to 4 chars of custom label for radar
    var short=(S.arc&&S.arc.statLabels&&S.arc.statLabels[k]?S.arc.statLabels[k]:k).slice(0,4).toUpperCase();
    svg+='<text x="'+p[0]+'" y="'+p[1]+'" text-anchor="middle" dominant-baseline="middle" fill="'+STAT_META[k].color+'" font-size="8.5" font-family="IBM Plex Mono,monospace" font-weight="700" letter-spacing="1">'+esc(short)+'</text>';
  });
  svg+='</svg>';
  return svg;
}

function renderWeeklyTab(){

  var cards='';

      +'</div>';
  });

    prev='<div style="background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.25);border-radius:4px;margin:0 14px 8px;padding:14px;">'+slbl("PREVIEW GAINS")+rows+'</div>';
  }

  var hist='';
  if((arc.weekReviews||[]).length>0){
    var items='';

    +'<div style="font-size:10px;color:'+MUTED+';line-height:1.6;">Score each stat 0–5. Stats only grow when you earn it. High stats resist easy gains.</div></div>'
    +cards
    +'<div style="padding:12px 14px;display:flex;gap:8px;">'
    +'<button data-a="preview" style="flex:1;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.3);border-radius:4px;color:#4ADE80;padding:13px;font-size:9px;letter-spacing:3px;font-weight:700;">PREVIEW</button>'

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  applyThemeGlobals();
  var root=document.getElementById('root');
  root.innerHTML=S.profile?renderApp():renderSelect();
  attachInputs();
  S.tabAnim=null;
}

function attachInputs(){
  // Notes textarea
  var nta=document.getElementById('nta');
  if(nta){nta.addEventListener('input',function(){S.today.notes=nta.value;saveToday(S.profile,S.today);});}
  [0,1,2].forEach(function(i){var f=document.getElementById('focus-'+i);if(f){f.addEventListener('input',function(){S.today=ensureToday(S.today);S.today.focus[i]=f.value;saveToday(S.profile,S.today);});}});
  ['win','weak','drained','restored','lesson','tomorrow'].forEach(function(k){var r=document.getElementById('cr-'+k);if(r){r.addEventListener('input',function(){S.dayReview[k]=r.value;});}});
  document.querySelectorAll('input[id^=\"trk-\"]').forEach(function(inp){inp.addEventListener('change',function(){setTrackerValueById(inp.id.slice(4),inp.value);render();});});
  // Stat sliders (profile creation)
  document.querySelectorAll('input[data-sl]').forEach(function(sl){
    sl.addEventListener('input',function(){
      var k=sl.dataset.sl;S.createStats[k]=parseInt(sl.value);
      var d=document.getElementById('sv-'+k);if(d)d.textContent=sl.value;
    });
  });
  // Name input autofocus + enter key
  var cname=document.getElementById('cname');
  if(cname){cname.focus();cname.setSelectionRange(cname.value.length,cname.value.length);cname.addEventListener('keydown',function(e){if(e.key==='Enter')doStep2();});}
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function doStep2(){
  var cname=document.getElementById('cname');
  var nm=(cname?cname.value:'').trim().toUpperCase();
  if(!nm){S.createErr="Name required.";render();return;}
  if(S.profiles.indexOf(nm)>=0){S.createErr="Name already taken.";render();return;}
  S.createName=nm;S.createErr="";refreshCreateStatsFromAnswers();S.createStep=2;render();
}

document.addEventListener('click',function(e){
  var el=e.target.closest('[data-a]');
  if(!el)return;
  var a=el.dataset.a;

  if(a==='pick'){
    var name=el.dataset.name;
    S.profile=name;setActive(name);
    S.arc=ensureArc(loadArc(name)||makeArc(NEUTRAL_STATS));
    S.today=loadToday(name);syncTodayXp();S.tab="profile";render();

  }else if(a==='startCreate'){
    S.creating=true;S.createStep=1;S.createName="";S.createErr="";S.createTemplate=null;S.createAnswers=makeDefaultAnswers();S.createStats=cp(NEUTRAL_STATS);render();

  }else if(a==='cancelCreate'){
    S.creating=false;S.createTemplate=null;render();

  }else if(a==='step2'){
    doStep2();

  }else if(a==='back1'){
    S.createStep=1;render();

  }else if(a==='presetAman'){
    S.createStats=cp(AMAN_STATS);render();

  }else if(a==='presetNeutral'){
    S.createAnswers=makeDefaultAnswers();S.createStats=cp(NEUTRAL_STATS);render();

  }else if(a==='finish'){
    var nm2=S.createName;
    if(!nm2){showToast("Name required.","#EF4444");return;}
    if(S.profiles.indexOf(nm2)>=0){showToast("Name already taken on this device.","#EF4444");return;}
    S.profiles.push(nm2);saveProfiles(S.profiles);
    var arc=applyCreateTemplate(ensureArc(makeArc(S.createStats)));saveArc(nm2,arc);
    S.profile=nm2;setActive(nm2);S.arc=arc;
    S.today=blankToday();saveToday(nm2,S.today);
    S.creating=false;S.createTemplate=null;S.tab="profile";render();

  }else if(a==='logout'){
    S.profile=null;setActive(null);S.arc=null;S.today=blankToday();S.tab="profile";render();

  }else if(a==='tab'){
    var order=['profile','quests','boss','weekly','codex'];
    var next=el.dataset.tab;
    S.tabAnim=(order.indexOf(next)>=order.indexOf(S.tab))?'tabInRight':'tabInLeft';
    S.tab=next;render();

  }else if(a==='openMode'){
    S.modeModal=true;render();

  }else if(a==='closeMode'){
    S.modeModal=false;render();

  }else if(a==='quickMode'){
    // Direct mode switch from profile tab toggle buttons
    var newMode=el.dataset.mode;
    if(S.arc.mode===newMode)return;
    rollbackTodayXp();
    S.arc=cp(S.arc);S.arc.mode=newMode;saveArc(S.profile,S.arc);
    render();
    showToast(newMode==="summer"?"Switched to Summer Mode":"Switched to School Mode",newMode==="summer"?"#FB923C":"#38BDF8");

  }else if(a==='switchMode'){
    var m2=el.dataset.mode;
    rollbackTodayXp();
    S.arc=cp(S.arc);S.arc.mode=m2;saveArc(S.profile,S.arc);
    S.modeModal=false;render();
    showToast(m2==="summer"?"Switched to Summer Mode":"Switched to School Mode",m2==="summer"?"#FB923C":"#38BDF8");

  }else if(a==='closeLvl'){
    S.lvlUp=null;render();

  }else if(a==='tq'){
    var qid=el.dataset.qid,xp=parseInt(el.dataset.xp)||0;
    S.today=ensureToday(cp(S.today));
    var q=cp(S.today.quests),aq=cp(S.today.appliedQuests||{});
    if(q[qid]){
      var old=aq[qid]||q[qid]||xp;delete q[qid];
      if(aq[qid]){delete aq[qid];applyXpDelta(-old);removeTimeline('quest',qid);showToast("Quest removed · -"+old+" XP","#FBBF24");}
    }else{
      var qInfo=findQuestById(qid);q[qid]=xp;aq[qid]=xp;applyXpDelta(xp);addTimeline('quest',qid,qInfo?qInfo.label:qid,xp);showToast("Quest complete · +"+xp+" XP","#4ADE80");
    }
    S.today.quests=q;S.today.appliedQuests=aq;saveToday(S.profile,S.today);render();

  }else if(a==='tb'){
    var bid=el.dataset.bid,bxp=parseInt(el.dataset.xp)||0;
    S.today=ensureToday(cp(S.today));
    var b=cp(S.today.boss),ab=cp(S.today.appliedBoss||{});
    if(b[bid]){
      var oldb=ab[bid]||b[bid]||bxp;delete b[bid];
      if(ab[bid]){delete ab[bid];applyXpDelta(-oldb);removeTimeline('boss',bid);showToast("Boss removed · -"+oldb+" XP","#FBBF24");}
    }else{
      var bInfo=findBossById(bid);b[bid]=bxp;ab[bid]=bxp;applyXpDelta(bxp);addTimeline('boss',bid,bInfo?bInfo.label:bid,bxp);showToast("Boss complete · +"+bxp+" XP","#4ADE80");
    }
    S.today.boss=b;S.today.appliedBoss=ab;saveToday(S.profile,S.today);render();

  }else if(a==='commit'){
    S.today=ensureToday(S.today);syncTodayXp();
    var qxp=sumObj(S.today.quests),bxp2=sumObj(S.today.boss),earned=liveDayXp();
    if(earned===0){showToast("Complete at least one quest first.","#EF4444");return;}
    S.closeModal=true;S.dayReview={win:"",weak:"",drained:"",restored:"",lesson:"",tomorrow:""};render();

  }else if(a==='cancelClose'){
    S.closeModal=false;render();

  }else if(a==='confirmCloseDay'){
    S.today=ensureToday(S.today);syncTodayXp();
    var qxp=sumObj(S.today.quests),bxp2=sumObj(S.today.boss),earned=liveDayXp();
    if(earned===0){S.closeModal=false;showToast("Complete at least one quest first.","#EF4444");render();return;}
    var arc2=ensureArc(cp(S.arc));arc2.stats=cp(S.arc.stats);
    var streak2=(arc2.lastDay===arc2.dayNumber-1||arc2.lastDay===0)?(arc2.streak||0)+1:1;
    var best=Math.max(arc2.bestStreak||0,streak2);
    var bossEntries=Object.keys(S.today.boss).map(function(id){var bf=getAllBosses().filter(function(x){return x.id===id;})[0];return{day:arc2.dayNumber,id:id,label:bf?bf.label:id,xp:S.today.boss[id]};});
    arc2.streak=streak2;arc2.bestStreak=best;arc2.lastDay=arc2.dayNumber;
    var review=cp(S.dayReview||{});
    arc2.history=(arc2.history||[]).concat([{day:arc2.dayNumber,xp:earned,quests:Object.keys(S.today.quests).length,boss:Object.keys(S.today.boss).length,notes:S.today.notes||"",focus:(S.today.focus||[]).slice(),timeline:(S.today.timeline||[]).slice(),trackers:cp(S.today.trackers||{}),weeklyTrackers:cp(S.arc.weeklyTrackers||{}),weekNumber:S.arc.weekNumber||1,review:review,mode:arc2.mode,date:(new Date()).toISOString().slice(0,10)}]);
    arc2.bossLog=(arc2.bossLog||[]).concat(bossEntries);arc2.dayNumber=arc2.dayNumber+1;
    S.arc=arc2;saveArc(S.profile,arc2);
    S.today=blankToday();saveToday(S.profile,S.today);
    S.closeModal=false;S.dayReview={win:"",weak:"",drained:"",restored:"",lesson:"",tomorrow:""};S.tab="profile";render();
    showToast("Day "+(arc2.dayNumber-1)+" closed · review saved","#4ADE80");

  }else if(a==='preview'){
    var gp={};STAT_KEYS.forEach(function(k){gp[k]=calcGain(S.scores[k],S.arc.stats[k]);});S.gainPrev=gp;render();

  }else if(a==='commitReview'){
    var gains={},nStats=cp(S.arc.stats);
    STAT_KEYS.forEach(function(k){var g=calcGain(S.scores[k],S.arc.stats[k]);gains[k]=g;nStats[k]=Math.min(100,nStats[k]+g);});
    var wn=(S.arc.weekReviews||[]).length+1;
    S.arc=cp(S.arc);S.arc.stats=nStats;S.arc.weekReviews=(S.arc.weekReviews||[]).concat([{week:wn,day:S.arc.dayNumber-1,scores:cp(S.scores),gains:gains}]);
    saveArc(S.profile,S.arc);
    S.scores=cp({Physical:0,Mental:0,Discipline:0,Intellect:0,Ambition:0,Relationship:0});S.gainPrev=null;
    S.tab="profile";render();showToast("Weekly review committed — stats updated!","#4ADE80");

  }else if(a==='sc'){
    S.scores=cp(S.scores);S.scores[el.dataset.key]=parseInt(el.dataset.val);S.gainPrev=null;render();

  }else if(a==='ans'){
    if(!S.createAnswers)S.createAnswers=makeDefaultAnswers();
    var ak=el.dataset.key,ai=parseInt(el.dataset.idx),av=parseInt(el.dataset.val);
    S.createAnswers[ak][ai]=av;
    if(!S.createStats)S.createStats=cp(NEUTRAL_STATS);
    S.createStats[ak]=scoreFromAnswers(ak);
    render();

  }else if(a==='copyShare'){
    var st=document.getElementById('shareText');
    copyText((st&&st.value)||buildShareLink());

  }else if(a==='copyStarter'){
    var stq=document.getElementById('starterText');
    copyText((stq&&stq.value)||buildQuestionnaireLink());

  }else if(a==='refreshShare'){
    render();showToast("Share link refreshed.","#A78BFA");

  }else if(a==='importNow'){
    var box=document.getElementById('importText');
    var raw=box?box.value:'';
    try{
      if(String(raw).indexOf('starter=')>=0){
        var payloadS=decData(raw.replace('#starter=','arc=').replace('starter=','arc='));
        S.profile=null;S.arc=null;S.today=blankToday();S.creating=true;S.createErr="";S.createAnswers=makeDefaultAnswers();S.createStats=cp(NEUTRAL_STATS);
        S.createTemplate=payloadS.template||null;
        var nmS=uniqueProfileName(payloadS.profile||'');S.createName=nmS==='SHARED'?"":nmS;S.createStep=S.createName?2:1;
        render();showToast("Questionnaire loaded.","#4ADE80");
      }else{
        var payload=decData(raw);if(importPayload(payload)){render();showToast(S.importMsg||"Profile imported.","#4ADE80");}else showToast("No profile data found.","#EF4444");
      }
    }catch(err){showToast("Could not import that link.","#EF4444");}

  }else if(a==='saveQuestNames'){
    var qLabels=cp(S.arc.questLabels||{}),qXp=cp(S.arc.questXp||{});
    getQuests(S.arc.mode).forEach(function(q){
      var li=document.getElementById('ql-'+q.id),xi=document.getElementById('qx-'+q.id);
      if(li&&li.value.trim())qLabels[q.id]=li.value.trim();
      var x=xi?parseInt(xi.value):q.xp;if(!isNaN(x)&&x>0)qXp[q.id]=x;
    });
    S.arc=ensureArc(cp(S.arc));S.arc.questLabels=qLabels;S.arc.questXp=qXp;saveArc(S.profile,S.arc);
    render();showToast("Quest changes saved.","#A78BFA");

  }else if(a==='addQ'){
    var stq=document.getElementById('nq-stat'),lq=document.getElementById('nq-label'),xq=document.getElementById('nq-xp');
    var label=(lq?lq.value:'').trim(); if(!label){showToast("Quest name required.","#EF4444");return;}
    var xpq=parseInt(xq?xq.value:10); if(isNaN(xpq)||xpq<1)xpq=10;
    var statq=stq?stq.value:'Physical';
    var nq={id:makeId('cq_'),mode:S.arc.mode,stat:statq,label:label,xp:xpq,custom:true};
    S.arc=ensureArc(cp(S.arc));S.arc.customQuests=(S.arc.customQuests||[]).concat([nq]);saveArc(S.profile,S.arc);
    render();showToast("Custom quest added.","#4ADE80");

  }else if(a==='delQ'){
    var did=el.dataset.id;
    S.arc=ensureArc(cp(S.arc));S.arc.customQuests=(S.arc.customQuests||[]).filter(function(q){return q.id!==did;});
    if(S.arc.questLabels)delete S.arc.questLabels[did]; if(S.arc.questXp)delete S.arc.questXp[did];
    if(S.today.quests&&S.today.quests[did])delete S.today.quests[did];
    saveArc(S.profile,S.arc);saveToday(S.profile,S.today);render();showToast("Custom quest deleted.","#F87171");

  }else if(a==='saveBossNames'){
    var bLabels=cp(S.arc.bossLabels||{}),bDescs=cp(S.arc.bossDescs||{}),bXp=cp(S.arc.bossXp||{});
    getBosses(S.arc.mode).forEach(function(b){
      var li=document.getElementById('bl-'+b.id),di=document.getElementById('bd-'+b.id),xi=document.getElementById('bx-'+b.id);
      if(li&&li.value.trim())bLabels[b.id]=li.value.trim();
      if(di&&di.value.trim())bDescs[b.id]=di.value.trim();
      var x=xi?parseInt(xi.value):b.xp;if(!isNaN(x)&&x>0)bXp[b.id]=x;
    });
    S.arc=ensureArc(cp(S.arc));S.arc.bossLabels=bLabels;S.arc.bossDescs=bDescs;S.arc.bossXp=bXp;saveArc(S.profile,S.arc);
    render();showToast("Boss changes saved.","#FBBF24");

  }else if(a==='addB'){
    var stb=document.getElementById('nb-stat'),lb=document.getElementById('nb-label'),db=document.getElementById('nb-desc'),xb=document.getElementById('nb-xp');
    var blabel=(lb?lb.value:'').trim(); if(!blabel){showToast("Boss name required.","#EF4444");return;}
    var bdesc=(db?db.value:'').trim()||"Complete this weekly boss quest.";
    var xpb=parseInt(xb?xb.value:100); if(isNaN(xpb)||xpb<1)xpb=100;
    var statb=stb&&stb.value?stb.value:null;
    var nb={id:makeId('cb_'),mode:S.arc.mode,stat:statb,icon:statb?STAT_META[statb].icon:'★',label:blabel,desc:bdesc,xp:xpb,custom:true};
    S.arc=ensureArc(cp(S.arc));S.arc.customBosses=(S.arc.customBosses||[]).concat([nb]);saveArc(S.profile,S.arc);
    render();showToast("Custom boss added.","#4ADE80");

  }else if(a==='delB'){
    var dbid=el.dataset.id;
    S.arc=ensureArc(cp(S.arc));S.arc.customBosses=(S.arc.customBosses||[]).filter(function(b){return b.id!==dbid;});
    if(S.arc.bossLabels)delete S.arc.bossLabels[dbid]; if(S.arc.bossDescs)delete S.arc.bossDescs[dbid]; if(S.arc.bossXp)delete S.arc.bossXp[dbid];
    if(S.today.boss&&S.today.boss[dbid])delete S.today.boss[dbid];
    saveArc(S.profile,S.arc);saveToday(S.profile,S.today);render();showToast("Custom boss deleted.","#F87171");

  }else if(a==='setTheme'){
    var tid=el.dataset.theme;
    if(THEMES[tid]){S.arc=ensureArc(cp(S.arc));S.arc.theme=tid;saveArc(S.profile,S.arc);render();showToast('Theme set: '+THEMES[tid].name,THEMES[tid].accent);}



  }else if(a==='trkInc'){
    var tidx=el.dataset.id,step=parseFloat(el.dataset.step)||0;incrementTracker(tidx,step);render();

  }else if(a==='saveTrackers'){
    S.arc=ensureArc(cp(S.arc));
    S.arc.trackerSettings=(S.arc.trackerSettings||[]).map(function(t){var r=cloneTracker(t),id=t.id;var active=document.getElementById('ta-'+id),label=document.getElementById('tl-'+id),target=document.getElementById('tt-'+id),step=document.getElementById('ts-'+id),xp=document.getElementById('tx-'+id),unit=document.getElementById('tu-'+id),stat=document.getElementById('tstat-'+id);r.active=active?!!active.checked:r.active;r.label=(label&&label.value.trim())?label.value.trim():r.label;r.target=parseFloat(target?target.value:r.target)||r.target;r.step=parseFloat(step?step.value:r.step)||r.step;r.xp=parseInt(xp?xp.value:r.xp)||0;r.unit=(unit?unit.value:r.unit)||'';r.stat=(stat&&stat.value)||r.stat;return r;});
    saveArc(S.profile,S.arc);render();showToast('Tracker settings saved.','#4ADE80');

  }else if(a==='addTracker'){
    var lab=document.getElementById('newTrLabel'),sc=document.getElementById('newTrScope'),st=document.getElementById('newTrStat'),ta=document.getElementById('newTrTarget'),sp=document.getElementById('newTrStep'),un=document.getElementById('newTrUnit'),xp=document.getElementById('newTrXp');
    var label=(lab?lab.value:'').trim();if(!label){showToast('Tracker name required.','#EF4444');return;}
    var tr={id:makeId('tr_'),scope:(sc&&sc.value)||'daily',label:label,unit:(un&&un.value)||'',target:parseFloat(ta?ta.value:1)||1,step:parseFloat(sp?sp.value:1)||1,xp:parseInt(xp?xp.value:10)||0,stat:(st&&st.value)||'Discipline',active:true,custom:true,desc:'Custom tracker.'};
    S.arc=ensureArc(cp(S.arc));S.arc.trackerSettings=(S.arc.trackerSettings||[]).concat([tr]);saveArc(S.profile,S.arc);render();showToast('Custom tracker added.','#4ADE80');

  }else if(a==='delTracker'){
    var didt=el.dataset.id;S.arc=ensureArc(cp(S.arc));S.arc.trackerSettings=(S.arc.trackerSettings||[]).filter(function(t){return t.id!==didt;});delete S.arc.weeklyTrackers[didt];Object.keys(S.arc.weeklyAwards||{}).forEach(function(k){if(k.indexOf('_'+didt)>-1)delete S.arc.weeklyAwards[k];});if(S.today.trackers)delete S.today.trackers[didt];if(S.today.appliedTrackers)delete S.today.appliedTrackers[didt];saveArc(S.profile,S.arc);saveToday(S.profile,S.today);render();showToast('Tracker deleted.','#F87171');

  }else if(a==='resetWeek'){
    S.arc=ensureArc(cp(S.arc));S.arc.weeklyTrackers={};S.arc.weeklyAwards={};S.arc.weekNumber=(S.arc.weekNumber||1)+1;saveArc(S.profile,S.arc);render();showToast('New weekly tracker cycle started.','#FBBF24');

  }else if(a==='exportBackup'){
    var fname='ascension-arc-'+String(S.profile||'profile').toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-backup.json';
    downloadText(fname,JSON.stringify(backupPayload(),null,2));showToast('Backup downloaded.','#4ADE80');

  }else if(a==='importBackup'){
    var bt=document.getElementById('backupText'),rawB=bt?bt.value:'';
    try{var bp=JSON.parse(rawB);if(bp&&bp.arc){importPayload({profile:bp.profile||'BACKUP',arc:bp.arc,today:bp.today||blankToday()});render();showToast('Backup imported.','#4ADE80');}else showToast('Backup JSON missing arc data.','#EF4444');}catch(e){showToast('Could not read backup JSON.','#EF4444');}

  }else if(a==='resetToday'){
    rollbackTodayXp();render();showToast('Today reset and XP rolled back.','#F87171');

  }else if(a==='saveLabels'){
    // Read all label inputs and save
    var newLabels=cp(DEFAULT_LABELS);
    STAT_KEYS.forEach(function(k){
      var inp=document.getElementById('sl-'+k);
      if(inp&&inp.value.trim())newLabels[k]=inp.value.trim();
    });
    S.arc=cp(S.arc);S.arc.statLabels=newLabels;saveArc(S.profile,S.arc);
    showToast("Stat labels saved!","#A78BFA");
    render();
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
S.profiles=getProfiles();
var imported=importStarterFromHash()||importFromHash();
if(!imported){
  var saved=getActive();
  if(saved&&S.profiles.indexOf(saved)>=0){
    S.profile=saved;
    S.arc=ensureArc(loadArc(saved)||makeArc(NEUTRAL_STATS));
    S.today=loadToday(saved);syncTodayXp();
  }
}
render();
if(S.importMsg)showToast(S.importMsg,S.importMsg.indexOf('Could')===0?'#EF4444':'#4ADE80');
</script>
