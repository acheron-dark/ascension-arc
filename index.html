function radar(){

  svg+='<path d="'+poly(75)+'" fill="rgba(251,191,36,.045)" stroke="rgba(251,191,36,.34)" stroke-width="1.4" stroke-dasharray="5 4"/>';
  svg+='<path d="'+statPath+'" fill="rgba(167,139,250,.18)" stroke="var(--accent)" stroke-width="2.4"/>';
  keys.forEach(function(k,i){
    var v=Math.max(0,Math.min(100,parseFloat(stats[k])||0));
    var p=pt(i,v),lp=pt(i,116),m=STAT_META[k]||{color:'var(--accent)',icon:'•'};

    svg+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]-5).toFixed(1)+'" text-anchor="middle" fill="'+m.color+'" font-size="8.5" font-family="IBM Plex Mono,monospace" font-weight="800">'+txt+'</text>';

  });

}

function renderHistoryPanel(){var w=weeklyStats();var energyRows=[1,2,3,4,5].map(function(n){return '<div style="display:flex;justify-content:space-between;font-size:10px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span>'+n+'/5 · '+formInfo(n).name+'</span><span style="color:var(--accent);font-weight:900">'+(w.energy[n]||0)+'</span></div>'}).join('');var statRows=STAT_KEYS.map(function(k){var m=STAT_META[k],v=w.statXp[k]||0;return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:10px"><span style="color:'+m.color+'">'+m.icon+' '+label(k)+'</span><span style="color:var(--dim)">'+v+' XP</span></div>'+prog(v,Math.max(40,w.total/2||40))+'</div>'}).join('');var days=(S.arc.history||[]).slice().reverse().slice(0,14).map(function(d){return '<div class="historyDay"><div style="display:flex;justify-content:space-between;gap:8px"><div><div style="font-size:11px;font-weight:900;color:#E2E8F0">Day '+esc(d.day)+' · '+esc(d.date||'')+'</div><div style="font-size:9px;color:var(--muted);margin-top:3px">'+(d.dayForm||3)+'/5 '+esc(d.dayFormName||'')+' · '+esc(d.rating||'')+' · '+esc(d.dominant||'No dominant stat')+'</div></div><div style="font-size:12px;color:var(--accent);font-weight:900">+'+(d.xp||0)+'</div></div><div style="font-size:8px;color:var(--dim);margin-top:6px">Boss clears: '+(d.bossClears||0)+' · Quest stages: '+(d.questCount||0)+' · Timeline: '+((d.timeline||[]).length)+'</div></div>'}).join('')||'<div style="font-size:10px;color:var(--dim)">No closed days yet.</div>';return '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px"><div style="border:1px solid var(--edge);background:rgba(255,255,255,.04);border-radius:12px;padding:10px"><div class="tiny">Week XP</div><div style="font-size:20px;font-weight:900;color:var(--accent)">'+w.total+'</div></div><div style="border:1px solid var(--edge);background:rgba(255,255,255,.04);border-radius:12px;padding:10px"><div class="tiny function renderDebugTools(){var dbg={version:VERSION,dataVersion:S.arc.appDataVersion||0,profile:S.profile,phase:S.phase,tab:S.tab,day:S.arc.dayNumber,level:S.arc.level,totalXp:S.arc.totalXp,dayForm:S.today.dayForm,appliedToday:S.today.appliedXp,questLibrary:{overrides:Object.keys((qlib().overrides||{})).length,hidden:Object.keys((qlib().hidden||{})).length,custom:(qlib().custom||[]).length},history:(S.arc.history||[]).length};return '<button class="btn" data-a="safeRepair" style="width:100%">Run Safe Repair / Migration</button><button class="btn" data-a="copyDebug" style="width:100%;margin-top:8px">Copy Debug Snapshot</button><button class="btn" data-a="exportHistory" style="width:100%;margin-top:8px">Download History JSON</button><div class="debugText">'+esc(JSON.stringify(dbg,null,2))+'</div>'}

'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px"><button class="btn" data-a="closeHealth">Cancel</button><button class="btn btnPrimary" data-a="saveHealth">Save Health</button></div></div></div>'}
function renderHealthModal(){return healthForm(S.healthDraft||S.arc.health||DEFAULT_HEALTH)}
function renderCodex(){var themes=Object.keys(THEMES).map(function(k){return '<option value="'+k+'" '+(S.arc.theme===k?'selected':'')+'>'+THEMES[k].name+'</option>'}).join('');var settings='<label class="tiny">Theme</label><select class="input" id="themeSel" data-a="themeChange" style="margin-top:8px">'+themes+'</select><label class="tiny" style="display:block;margin-top:14px">Arc</label><select class="input" id="modeSel" data-a="modeChange" style="margin-top:8px"><option value="school" '+(S.arc.mode==='school'?'selected':'')+'>School Arc</option><option value="summer" '+(S.arc.mode==='summer'?'selected':'')+'>Summer Arc</option></select><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:12px">Theme stays independent from School/Summer. The Tailor Questionnaire and Quest Library control what tasks actually appear.</div>';var tailor='<button class="btn btnPrimary" data-a="openTailor" style="width:100%">Retake Tailor Questionnaire</button><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:12px">Current: '+Object.keys(S.arc.tailor).filter(function(k){return S.arc.tailor[k]}).map(function(k){return k}).join(', ')+'</div>';var share='<button class="btn" data-a="copyShare" style="width:100%">Copy Full Snapshot Link</button><button class="btn" data-a="copyStarter" style="width:100%;margin-top:8px">Copy Starter Link</button><button class="btn" data-a="export" style="width:100%;margin-top:8px">Download Backup</button><button class="btn" data-a="import" style="width:100%;margin-top:8px">Import Backup / Link</button>';var danger='<button class="btn" data-a="resetToday" style="width:100%">Reset Today + Roll Back Today XP</button><button class="btn" data-a="closeDay" style="width:100%;margin-top:8px">Close Day</button>';var health='<button class="btn btnPrimary" data-a="openHealth" style="width:100%">Open Health & Macro Setup</button><div style="margin-top:12px">'+macroSummary()+'</div>';return '<div>'+codexSection('PROFILE SETTINGS','Theme and School/Summer Arc.',settings,true)+codexSection('TAILOR QUESTIONNAIRE','Redo this to personalize default quest/tracker generation.',tailor,false)+codexSection('QUEST LIBRARY','Rename, rewrite, hide, or add profile-specific quests.',renderQuestLibrary(),true)+codexSection('WEEKLY REVIEW / HISTORY','Weekly report, day archive, energy patterns, and boss summary.',renderHistoryPanel(),false)+codexSection('HEALTH & MACRO SETUP','Age, height, weight, activity, and macro targets.',health,false)+codexSection('SHARE / BACKUP','Links, starter templates, and backups.',share,false)+codexSection('DEBUG / RESET TOOLS','Safe repair, diagnostics, and history export.',renderDebugTools(),false)+codexSection('DAY DATA','Close or reset the current day.',danger,false)+codexSection('VERSION',VERSION,'<div style="font-size:10px;color:var(--muted);line-height:1.6">V6.4.1 refines the default quest library with direct ADHD-friendly Stage 1–5 tasks, profile presets, profile-specific hiding/editing, safer migration, weekly report, day archive, energy history, boss summary, and debug tools.</div>',false)+'</div>'}
function recentTimeline(){var rows=(S.today.timeline||[]).slice(0,6).map(function(e){var color=e.stat&&STAT_META[e.stat]?STAT_META[e.stat].color:'var(--accent)';return '<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:9px;color:var(--muted)"><span class="pill" style="font-size:8px;padding:4px 7px">'+esc(e.time)+'</span><span style="flex:1">'+(e.stat?'<b style="color:'+color+'">'+label(e.stat)+'</b> · ':'')+esc(e.label)+'</span>'+(e.xp?'<span style="color:var(--accent);font-weight:900">+'+e.xp+'</span>':'')+'</div>'}).join('')||'<div style="font-size:10px;color:var(--dim)">No actions logged yet.</div>';return card('<div class="sectionTitle">TODAY’S TIMELINE</div>'+rows)}
function renderApp(){applyTheme();var tab=S.tab==='home'?renderHome():S.tab==='quests'?renderQuests():S.tab==='track'?renderTrack():S.tab==='boss'?renderBoss():renderCodex();var cls=S.animateTab?'tabAnim':'';return '<div class="appBg"><div class="fog"></div>'+buildStars()+'<div class="content">'+header()+'<div class="'+cls+'">'+tab+'</div></div>'+nav()+'</div>'}
function render(){applyTheme();var html='';if(S.toast)html+='<div style="position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:80;background:rgba(0,0,0,.78);border:1px solid var(--edge);border-radius:999px;padding:9px 16px;font-size:10px;color:var(--accent)">'+esc(S.toast)+'</div>';if(S.xpFloat)html+='<div class="xpFloat">'+esc(S.xpFloat)+'</div>';if(S.levelUp){var lc=themedSystemCopy('level',S.levelUp.rank.name);html+='<div class="modalBack"><div class="modal" style="text-align:center"><div style="font-size:56px;color:var(--accent)">✦</div><div class="tiny">'+esc(lc.title)+'</div><div style="font-size:36px;font-weight:900;margin-top:8px">LVL '+S.levelUp.level+'</div><div style="color:var(--accent);font-size:13px;font-weight:900;margin-top:6px">'+S.levelUp.rank.name+'</div><div style="font-size:11px;color:#E2E8F0;line-height:1.55;margin-top:12px">'+esc(lc.body)+'</div><div style="font-size:10px;color:var(--dim);line-height:1.5;margin-top:10px">'+esc(lc.sub)+'</div><button class="btn btnPrimary" data-a="closeLevel" style="width:100%;margin-top:18px">Acknowledge</button></div></div>';}if(S.systemModal)html+=renderSystemModal();if(S.questDraft)html+=renderQuestEditorModal();if(S.phase==='splash')html+=renderSplash();else if(S.phase==='landing')html+=renderLanding();else if(S.phase==='select')html+=renderSelect();else if(S.phase==='create')html+=renderCreate();else if(S.phase==='entry')html+=renderEntry();else if(S.phase==='tailor')html+=renderApp()+renderTailorModal();else if(S.phase==='health')html+=renderApp()+renderHealthModal();else html+=renderApp();document.getElementById('root').innerHTML=html;if(S.keepScroll!=null){var y=S.keepScroll;S.keepScroll=null;requestAnimationFrame(function(){window.scrollTo(0,y)})}S.animateTab=false}
function stableRender(){S.keepScroll=window.scrollY||document.documentElement.scrollTop||0;S.animateTab=false;render()}
function createProfile(){var name=(document.getElementById('newName')||{}).value||'';name=name.trim().toUpperCase().slice(0,20);if(!name){toast('Enter a profile name.');return}var theme=(document.getElementById('newTheme')||{}).value||defaultThemeForName(name);var mode=(document.getElementById('newMode')||{}).value||'school';var p=getProfiles();if(p.indexOf(name)<0)p.push(name);saveProfiles(p);var health=Object.assign(cp(DEFAULT_HEALTH),{age:(document.getElementById('newAge')||{}).value||'',weightLb:(document.getElementById('newWeight')||{}).value||'',heightFt:(document.getElementById('newFt')||{}).value||'',heightIn:(document.getElementById('newIn')||{}).value||'',sex:(document.getElementById('newSex')||{}).value||'neutral'});var arc=ensureArc({theme:theme,mode:mode,tailor:defaultTailorForName(name),stats:defaultStatsForName(name),health:health},name);saveArc(name,arc);saveToday(name,blankToday());S.profiles=p;setProfile(name)}
function exportBackup(){var data=JSON.stringify({profile:S.profile,arc:S.arc,today:S.today},null,2);var blob=new Blob([data],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ascension-arc-'+S.profile+'.json';a.click();URL.revokeObjectURL(a.href)}function importBackup(){var txt=prompt('Paste backup JSON or shared link:');if(!txt)return;try{var p=txt.trim()[0]==='{'?JSON.parse(txt):dec(txt);if(p.arc){var name=(p.profile||'IMPORTED').toUpperCase().slice(0,20);var arr=getProfiles();if(arr.indexOf(name)<0)arr.push(name);saveProfiles(arr);saveArc(name,p.arc);saveToday(name,p.today||blankToday());S.profiles=arr;setProfile(name);toast('Imported '+name)}}catch(e){toast('Import failed.')}}function handleHash(){var h=location.hash||'';if(h.indexOf('arc=')>=0){try{var p=dec(h);if(p.arc){var name=(p.profile||'SHARED').toUpperCase().slice(0,20);var arr=getProfiles();if(arr.indexOf(name)<0)arr.push(name);saveProfiles(arr);saveArc(name,p.arc);saveToday(name,p.today||blankToday());history.replaceState(null,'',location.href.split('#')[0]);S.profiles=arr;setProfile(name);return true}}catch(e){}}if(h.indexOf('starter=')>=0){try{var p=dec(h);history.replaceState(null,'',location.href.split('#')[0]);S.pendingTemplate=p.template||{};S.phase='create';return true}catch(e){}}return false}
function exportHistory(){var data=JSON.stringify({profile:S.profile,history:S.arc.history||[],weekReviews:S.arc.weekReviews||[]},null,2);var blob=new Blob([data],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ascension-arc-history-'+S.profile+'.json';a.click();URL.revokeObjectURL(a.href)}
function bind(){document.addEventListener('click',function(e){var el=e.target.closest('[data-a]');if(!el)return;var a=el.getAttribute('data-a');if(a==='afterSplash'){S.phase=(S.today&&S.today.dayForm)?'app':'landing';S.tab='home';render()}else if(a==='landing'){S.phase='landing';render()}else if(a==='continueArc'){S.phase=(S.today.dayForm?'app':'entry');S.tab='home';S.entryForm=S.today.dayForm||3;render()}else if(a==='select'){S.phase='select';render()}else if(a==='create'){S.phase='create';render()}else if(a==='pick'){setProfile(el.getAttribute('data-name'))}else if(a==='finishCreate'){createProfile()}else if(a==='entry'){S.phase='entry';S.entryForm=S.today.dayForm||3;render()}else if(a==='energy'){S.entryForm=parseInt(el.getAttribute('data-n'))||3;render()}else if(a==='saveEntry'){S.today.dayForm=S.entryForm||3;S.today.date=todayStr();S.today.focus=[0,1,2].map(function(i){return (document.getElementById('focus'+i)||{}).value||''});timeline('Day Form set: '+formInfo(S.today.dayForm).name,0,'','entry');saveAll();S.phase='app';S.tab='home';render()}else if(a==='tab'){S.tab=el.getAttribute('data-tab');S.animateTab=true;render()}else if(a==='toggleQuest'){toggleQuest(el.getAttribute('data-id'))}else if(a==='questStage'){setQuestStage(el.getAttribute('data-id'),el.getAttribute('data-stage'))}else if(a==='bossTask'){toggleBossTask(el.getAttribute('data-id'),el.getAttribute('data-idx'))}else if(a==='questEdit'){openQuestEditor(el.getAttribute('data-id'))}else if(a==='questNew'){openQuestEditor(null)}else if(a==='questSave'){saveQuestEditor()}else if(a==='questCancel'){S.questDraft=null;render()}else if(a==='questDelete'){deleteCustomQuest(el.getAttribute('data-id'))}else if(a==='questHide'){toggleQuestHidden(el.getAttribute('data-id'))}else if(a==='questReset'){resetQuestLibrary()}else if(a==='presetAman'){if(confirm('Apply Aman preset? This resets preset quest edits but keeps custom quests.'))applyRecommendedPreset('aman')}else if(a==='presetPremed'){if(confirm('Apply Creative Pre-Med preset? This resets preset quest edits but keeps custom quests.'))applyRecommendedPreset('premed')}else if(a==='presetBalanced'){if(confirm('Apply Balanced preset? This resets preset quest edits but keeps custom quests.'))applyRecommendedPreset('balanced')}else if(a==='weeklyReview'){saveWeeklyReview()}else if(a==='safeRepair'){S.arc=ensureArc(S.arc,S.profile);S.today=ensureToday(S.today);saveAll();toast('Safe repair complete.');render()}else if(a==='copyDebug'){copyText(JSON.stringify({version:VERSION,profile:S.profile,arc:S.arc,today:S.today},null,2))}else if(a==='exportHistory'){exportHistory()}else if(a==='addTrack'){addTracker(el.getAttribute('data-id'),parseFloat(el.getAttribute('data-val')))}else if(a==='customTrack'){customTrack(el.getAttribute('data-id'))}else if(a==='openTailor'){S.tailorDraft=cp(S.arc.tailor);S.phase='tailor';render()}else if(a==='openHealth'){S.healthDraft=cp(S.arc.health||DEFAULT_HEALTH);S.phase='health';render()}else if(a==='tailorToggle'){var k=el.getAttribute('data-key');S.tailorDraft[k]=!S.tailorDraft[k];render()}else if(a==='closeTailor'){S.tailorDraft=null;S.phase='app';render()}else if(a==='saveTailor'){S.arc.tailor=Object.assign(cp(DEFAULT_TAILOR),S.tailorDraft||{});S.tailorDraft=null;saveAll();S.phase='app';toast('Tailor saved.');render()}else if(a==='closeHealth'){S.healthDraft=null;S.phase='app';render()}else if(a==='saveHealth'){S.arc.health=Object.assign(cp(DEFAULT_HEALTH),{age:(document.getElementById('hAge')||{}).value||'',weightLb:(document.getElementById('hWeight')||{}).value||'',heightFt:(document.getElementById('hFt')||{}).value||'',heightIn:(document.getElementById('hIn')||{}).value||'',sex:(document.getElementById('hSex')||{}).value||'neutral',activity:(document.getElementById('hActivity')||{}).value||'moderate',goal:(document.getElementById('hGoal')||{}).value||'recomp'});S.healthDraft=null;saveAll();S.phase='app';toast('Health setup saved.');render()}else if(a==='copyShare'){copyText(shareLink())}else if(a==='copyStarter'){copyText(starterLink())}else if(a==='export'){exportBackup()}else if(a==='import'){importBackup()}else if(a==='resetToday'){if(confirm('Reset today and roll back today XP?')){if(S.today.appliedXp){S.arc.totalXp=Math.max(0,S.arc.totalXp-S.today.appliedXp);var st=stateFromTotal(S.arc.totalXp);S.arc.level=st.level;S.arc.xp=st.xp}S.today=blankToday();saveAll();S.phase='entry';render()}}else if(a==='closeDay'){if(confirm('Close today and move to next day?'))closeDay()}else if(a==='closeLevel'){S.levelUp=null;render()}else if(a==='closeSystem'){S.systemModal=null;render()}});document.addEventListener('change',function(e){var el=e.target;if(el&&el.getAttribute('data-a')==='themeChange'){S.arc.theme=el.value;saveAll();render()}if(el&&el.getAttribute('data-a')==='modeChange'){S.arc.mode=el.value;saveAll();render()}})}
