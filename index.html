function renderSelect(){var cards=S.profiles.map(function(n){var a=loadArc(n),p=ARC_PRESETS[a.arcType]||ARC_PRESETS.renaissance,t=THEMES[a.theme]||THEMES.nightmare,rank=getRank(a.level);return '<div class="profileCard" data-a="pick" data-name="'+esc(n)+'"><div class="sigil" style="color:'+t.accent+'">'+t.icon+'</div><div style="flex:1"><div style="font-size:15px;font-weight:900;letter-spacing:2px">'+esc(n)+'</div><div style="font-size:10px;color:'+t.accent+';margin-top:3px">'+esc(p.name)+'</div><div style="font-size:8px;color:var(--dim);margin-top:3px">'+rank.name+' · LVL '+a.level+' · Day '+a.dayNumber+'</div></div><div style="font-size:22px;color:var(--dim)">›</div></div>'}).join('');return '<div class="appBg"><div class="fog"></div>'+buildStars()+'<div class="content fade" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px"><div style="width:100%;max-width:390px"><div style="text-align:center;margin-bottom:30px"><div style="font-family:\'Cinzel Decorative\',serif;font-size:24px;letter-spacing:5px">ASCENSION ARC</div><div class="tiny" style="margin-top:8px">Choose Profile</div></div>'+(cards||'<div style="text-align:center;color:var(--dim);font-size:11px;padding:24px">No profiles yet.</div>')+'<button class="btn btnPrimary" data-a="create" style="width:100%;margin-top:10px">+ New Profile</button></div></div></div>'}
function renderCreate(){var tpl=S.pendingTemplate||{};return '<div class="appBg"><div class="fog"></div>'+buildStars()+'<div class="content fade" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px"><div style="width:100%;max-width:410px"><div style="text-align:center;margin-bottom:24px"><div style="font-family:\'Cinzel Decorative\',serif;font-size:22px;letter-spacing:4px">CREATE ARC</div><div class="tiny" style="margin-top:8px">Profile + Current Path</div></div><div class="card" style="margin:0"><label class="tiny">Profile Name</label><input id="newName" class="input" style="margin-top:8px;text-transform:uppercase" placeholder="Name" value=""/><label class="tiny" style="display:block;margin-top:14px">Core Arc</label><select id="preset" class="input" style="margin-top:8px"><option value="renaissance" '+(tpl.arcType==='renaissance'?'selected':'')+'>Renaissance Law Arc</option><option value="creative" '+(tpl.arcType==='creative'?'selected':'')+'>Creative Pre-Med Arc</option><option value="recovery" '+(tpl.arcType==='recovery'?'selected':'')+'>Recovery Arc</option></select><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:12px">You can change the theme, trackers, and labels later in the Codex.</div><button class="btn btnPrimary" data-a="finishCreate" style="width:100%;margin-top:18px">Begin Arc</button><button class="btn" data-a="select" style="width:100%;margin-top:8px">Back</button></div></div></div></div>'}
function renderEntry(){var t=th(),df=S.entryEnergy||S.today.dayForm||3,forms=dayForms();var cards=forms.map(function(f){return '<button class="energyCard '+(df===f.n?'active':'')+'" data-a="energy" data-n="'+f.n+'"><div style="font-size:20px;font-weight:900;color:'+(df===f.n?'var(--accent)':'#E2E8F0')+'">'+f.n+'/5 · '+esc(f.name)+'</div><div style="font-size:9px;color:var(--muted);line-height:1.5;margin-top:6px">'+esc(f.desc)+'</div><div style="font-size:8px;color:var(--dim);margin-top:7px">'+esc(f.xp)+'</div></button>'}).join('');var f=formInfo(df);return '<div class="appBg"><div class="fog"></div>'+buildStars()+'<div class="content fade" style="min-height:100vh;padding:24px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="tiny">Daily Entry</div><div style="font-size:26px;font-weight:900;letter-spacing:2px;margin-top:6px">Choose Day Form</div><div style="font-size:11px;color:var(--muted);margin-top:4px">The app scales to your capacity today.</div></div><div class="sigil" style="width:44px;height:44px">'+t.icon+'</div></div><div class="card" style="margin:24px 0 0"><div class="tiny">Selected</div><div style="font-size:24px;font-weight:900;color:var(--accent);margin-top:8px">'+esc(f.name)+'</div><div style="font-size:11px;color:var(--muted);line-height:1.7;margin-top:6px">'+esc(f.desc)+'</div></div><div class="energyGrid" style="margin-top:12px">'+cards+'</div><div class="card" style="margin:14px 0 0"><div class="sectionTitle">Today’s Focus</div><input id="focus0" class="input" placeholder="Focus 1" value="'+esc(S.today.focus[0]||'')+'"/><input id="focus1" class="input" placeholder="Focus 2" style="margin-top:8px" value="'+esc(S.today.focus[1]||'')+'"/><input id="focus2" class="input" placeholder="Focus 3" style="margin-top:8px" value="'+esc(S.today.focus[2]||'')+'"/><button id="entrySave" class="btn btnPrimary" data-a="saveEntry" onclick="window.arcSaveEntry && window.arcSaveEntry();return false;" style="width:100%;margin-top:14px">Enter Dashboard</button></div></div></div>'}
function renderHome(){if(S.today&&S.today.closed){return '<div>'+themeCard()+card('<div class="sectionTitle">DAY CLOSED</div><div style="font-size:22px;font-weight:900;color:var(--accent)">Arc archived for today</div><div style="font-size:10px;color:var(--muted);line-height:1.7;margin-top:8px">Your day has been closed. The app will ask for a new Day Form when the calendar date changes. You can still review Codex or switch profiles.</div>')+recentTimeline()+'</div>'}var df=S.today.dayForm||3,f=formInfo(df),simple=df<=2;var focus=S.today.focus.filter(Boolean);var topTrack=visibleTrackers().map(function(tr){return trackerCard(tr,true)}).join('');var core=questDefs().slice(0,3).map(function(q){return '<div class="trow"><div class="check '+(S.today.quests[q.id]?'on':'')+'">'+(S.today.quests[q.id]?'✓':'')+'</div><div style="flex:1"><div style="font-size:11px;font-weight:700">'+esc(q.label)+'</div><div style="font-size:9px;color:var(--muted);line-height:1.45;margin-top:2px">'+esc(questGoal(q))+'</div></div><button class="btn" data-a="toggleQuest" data-id="'+q.id+'" style="padding:8px 10px">+'+questXp()+'</button></div>'}).join('');return '<div>'+themeCard()+card('<div class="sectionTitle">DAY FORM</div><div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start"><div><div style="font-size:24px;font-weight:900;color:var(--accent)">'+f.n+'/5 · '+esc(f.name)+'</div><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:5px">'+esc(f.desc)+'</div></div><button class="btn" data-a="entry" style="padding:9px 11px">CHANGE</button></div>')+card('<div class="sectionTitle">ASCENSION PATH</div>'+rankPath())+card('<div class="sectionTitle">STAT CHART</div>'+radar())+(focus.length?card('<div class="sectionTitle">TODAY’S FOCUS</div><div style="display:grid;grid-template-columns:1fr;gap:8px">'+focus.map(function(x,i){return '<div style="border:1px solid var(--edge);background:rgba(255,255,255,.04);border-radius:12px;padding:10px;font-size:10px;color:var(--muted)"><b style="color:var(--accent)">'+(i+1)+'.</b> '+esc(x)+'</div>'}).join('')+'</div>'):'')+(simple?card('<div class="sectionTitle">MINIMUM CORE WINS</div><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-bottom:8px">Hard-day dashboard: fewer goals, attainable wins, streak protection.</div>'+core):card('<div class="sectionTitle">TOP TRACKERS</div>'+topTrack))+recentTimeline()+'</div>'}
function themeCard(){var t=th(),p=ARC_PRESETS[S.arc.arcType]||ARC_PRESETS.renaissance;return '<div class="card" style="background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 12%,transparent),color-mix(in srgb,var(--accent2) 7%,transparent));border-color:color-mix(in srgb,var(--accent) 28%,transparent)"><div style="display:flex;align-items:center;gap:12px"><div class="sigil" style="width:40px;height:40px">'+t.icon+'</div><div style="flex:1"><div style="font-size:10px;font-weight:900;letter-spacing:2px;color:var(--accent)">'+esc(t.name).toUpperCase()+'</div><div style="font-size:9px;color:var(--muted);line-height:1.5;margin-top:3px">'+esc(p.name)+' · Same Sleeper → Divine path.</div></div></div></div>'}
function renderQuests(){var groups=questDefs().map(function(q){var done=!!S.today.quests[q.id],m=STAT_META[q.stat]||STAT_META.Mind;return '<div class="qrow" data-a="toggleQuest" data-id="'+q.id+'"><div class="check '+(done?'on':'')+'">'+(done?'✓':'')+'</div><div style="flex:1"><div style="font-size:11px;font-weight:800;color:'+m.color+'">'+m.icon+' '+esc(q.label)+'</div><div style="font-size:10px;color:var(--muted);line-height:1.5;margin-top:3px">'+esc(questGoal(q))+'</div></div><div style="font-size:11px;color:'+(done?'var(--dim)':'var(--accent)')+';font-weight:900">+'+questXp()+'</div></div>'}).join('');return '<div>'+card('<div class="sectionTitle">ADAPTIVE QUESTS</div><div style="font-size:10px;color:var(--muted);line-height:1.6">These change with your Day Form. A 1/5 day shows minimum wins. A 5/5 day unlocks max goals.</div>')+card(groups)+'</div>'}
function renderTrack(){var trs=trackerDefs().map(function(tr){return trackerCard(tr,false)}).join('');return '<div>'+card('<div class="sectionTitle">INCREMENTAL TRACKERS</div><div style="font-size:10px;color:var(--muted);line-height:1.6">Targets scale with your Day Form. Halfway and complete milestones award XP once per day.</div>')+card(trs)+'</div>'}
function renderBoss(){var df=S.today.dayForm||3;var list=trackerDefs().slice(0,4).map(function(tr){var val=S.today.trackerValues[tr.id]||0,target=trackerTarget(tr),pct=Math.min(100,Math.round(val/target*100));return '<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:10px"><span>'+esc(tr.name)+'</span><span style="color:var(--dim)">'+val+'/'+target+'</span></div><div class="progress" style="margin-top:5px"><div class="bar" style="width:'+pct+'%"></div></div></div>'}).join('');var bossReady=df>=4;return '<div>'+card('<div class="sectionTitle">WEEKLY BOSS PATH</div><div style="font-size:10px;color:var(--muted);line-height:1.6">Boss progress becomes more available on Surge and Ascension days, but hard days still protect momentum.</div>')+card('<div style="display:flex;justify-content:space-between;gap:12px"><div><div style="font-size:15px;font-weight:900;color:var(--accent)">'+(bossReady?'Boss Window Open':'Boss Window Quiet')+'</div><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:5px">'+(bossReady?'Strong day. Push weekly goals if you can.':'Focus on minimum wins. No pressure to boss rush today.')+'</div></div><div style="font-size:28px">★</div></div><div style="margin-top:14px">'+list+'</div>')+'</div>'}
function codexSection(title,sub,body,open){return '<details class="codexBox" '+(open?'open':'')+'><summary><div><div style="font-size:10px;font-weight:900;letter-spacing:2px;color:var(--accent)">'+title+'</div><div style="font-size:8.5px;color:var(--dim);line-height:1.5;margin-top:4px">'+sub+'</div></div><div style="font-size:18px;color:var(--accent)">›</div></summary><div class="codexBody">'+body+'</div></details>'}
function renderCodex(){var themeOpts=Object.keys(THEMES).map(function(k){return '<option value="'+k+'" '+(S.arc.theme===k?'selected':'')+'>'+THEMES[k].name+'</option>'}).join('');var arcOpts=Object.keys(ARC_PRESETS).map(function(k){return '<option value="'+k+'" '+(S.arc.arcType===k?'selected':'')+'>'+ARC_PRESETS[k].name+'</option>'}).join('');var share='<button class="btn" data-a="copyShare" style="width:100%">Copy Full Snapshot Link</button><button class="btn" data-a="copyStarter" style="width:100%;margin-top:8px">Copy Starter Link</button><button class="btn" data-a="export" style="width:100%;margin-top:8px">Download Backup</button><button class="btn" data-a="import" style="width:100%;margin-top:8px">Import Backup / Link</button>';var settings='<label class="tiny">Theme</label><select class="input" id="themeSel" data-a="themeChange" style="margin-top:8px">'+themeOpts+'</select><label class="tiny" style="display:block;margin-top:14px">Core Arc</label><select class="input" id="arcSel" data-a="arcChange" style="margin-top:8px">'+arcOpts+'</select><div style="font-size:10px;color:var(--muted);line-height:1.6;margin-top:12px">Theme changes the world. Arc changes quests and trackers.</div>';var danger='<button class="btn" data-a="resetToday" style="width:100%">Reset Today + Roll Back Today XP</button><button class="btn" data-a="closeDay" style="width:100%;margin-top:8px">Close Day</button>';return '<div>'+codexSection('PROFILE SETTINGS','Theme, arc, and aesthetics.',settings,true)+codexSection('SHARE / BACKUP','Links, starter templates, and backups.',share,false)+codexSection('DAY DATA','Close or reset the current day.',danger,false)+codexSection('VERSION',VERSION,'<div style="font-size:10px;color:var(--muted);line-height:1.6">Energy Scaling, Splash/Landing screens, Day Form 1–5, adaptive quests, adaptive trackers, radar stat chart, and theme-specific aesthetics.</div>',false)+'</div>'}
function recentTimeline(){var rows=(S.today.timeline||[]).slice(0,5).map(function(e){return '<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:9px;color:var(--muted)"><span class="pill" style="font-size:8px;padding:4px 7px">'+esc(e.time)+'</span><span style="flex:1">'+esc(e.label)+'</span>'+(e.xp?'<span style="color:var(--accent);font-weight:900">+'+e.xp+'</span>':'')+'</div>'}).join('')||'<div style="font-size:10px;color:var(--dim)">No actions logged yet.</div>';return card('<div class="sectionTitle">TODAY’S TIMELINE</div>'+rows)}
function renderApp(){applyTheme();var tab=S.tab==='home'?renderHome():S.tab==='quests'?renderQuests():S.tab==='track'?renderTrack():S.tab==='boss'?renderBoss():renderCodex();return '<div class="appBg"><div class="fog"></div>'+buildStars()+'<div class="content">'+header()+'<div class="tabAnim">'+tab+'</div></div>'+nav()+'</div>'}
function render(){applyTheme();var html='';if(S.toast)html+='<div style="position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:80;background:rgba(0,0,0,.75);border:1px solid var(--edge);border-radius:999px;padding:9px 16px;font-size:10px;color:var(--accent)">'+esc(S.toast)+'</div>';if(S.xpFloat)html+='<div class="xpFloat">'+esc(S.xpFloat)+'</div>';if(S.levelUp)html+='<div class="modalBack" data-a="closeLevel"><div class="modal" style="text-align:center"><div style="font-size:56px;color:var(--accent)">✦</div><div class="tiny">LEVEL UP</div><div style="font-size:36px;font-weight:900;margin-top:8px">LVL '+S.levelUp.level+'</div><div style="color:var(--accent);font-size:13px;font-weight:900;margin-top:6px">'+S.levelUp.rank.name+'</div><div style="font-size:10px;color:var(--dim);margin-top:14px">tap to continue</div></div></div>';if(S.phase==='splash')html+=renderSplash();else if(S.phase==='landing')html+=renderLanding();else if(S.phase==='select')html+=renderSelect();else if(S.phase==='create')html+=renderCreate();else if(S.phase==='entry')html+=renderEntry();else html+=renderApp();document.getElementById('root').innerHTML=html;afterRenderBindings()}
function bind(){document.addEventListener('click',function(e){var el=e.target.closest('[data-a]');if(!el)return;var a=el.getAttribute('data-a');if(a==='afterSplash'){goAfterSplash()}else if(a==='landing'){S.phase='landing';render()}else if(a==='dashboard'){S.phase='app';S.tab='home';render()}else if(a==='select'){S.phase='select';render()}else if(a==='create'){S.phase='create';render()}else if(a==='pick'){setProfile(el.getAttribute('data-name'))}else if(a==='finishCreate'){createProfile()}else if(a==='entry'){S.phase='entry';S.entryEnergy=S.today&&S.today.dayForm?S.today.dayForm:3;render()}else if(a==='energy'){S.entryEnergy=parseInt(el.getAttribute('data-n'));render()}else if(a==='saveEntry'){saveEntry()}else if(a==='tab'){S.tab=el.getAttribute('data-tab');render()}else if(a==='toggleQuest'){toggleQuest(el.getAttribute('data-id'))}else if(a==='addTrack'){addTracker(el.getAttribute('data-id'),parseFloat(el.getAttribute('data-val')))}else if(a==='customTrack'){customTracker(el.getAttribute('data-id'))}else if(a==='copyShare'){copy(shareLink())}else if(a==='copyStarter'){copy(starterLink())}else if(a==='export'){exportBackup()}else if(a==='import'){importBackup()}else if(a==='resetToday'){if(confirm('Reset today and roll back today XP?')){if(S.today.appliedXp){S.arc.totalXp=Math.max(0,S.arc.totalXp-S.today.appliedXp);var st=stateFromTotal(S.arc.totalXp);S.arc.level=st.level;S.arc.xp=st.xp}S.today=blankToday();saveAll();S.phase='entry';render()}}else if(a==='closeDay'){if(confirm('Close today and move to the next day?'))closeDay()}else if(a==='closeLevel'){S.levelUp=null;render()}});document.addEventListener('change',function(e){var el=e.target;if(el&&el.getAttribute('data-a')==='themeChange'){S.arc.theme=el.value;saveAll();render()}if(el&&el.getAttribute('data-a')==='arcChange'){S.arc.arcType=el.value;S.arc.theme=ARC_PRESETS[el.value].theme;saveAll();render()}})}
function init(){bind();S.profiles=getProfiles();if(handleHash())return;var active=getActive();if(active&&S.profiles.indexOf(active)>=0){S.profile=active;S.arc=loadArc(active);S.today=loadToday(active);resetDayIfNew();S.phase='splash';setTimeout(function(){if(S.phase==='splash'){goAfterSplash()}},4200)}else{S.phase=S.profiles.length?'select':'create'}render()}
init();
</script>
</body>
